<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sea Route JSON Editor</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #3DA5E5;
      --primary-dark: #2B89C2;
      --primary-soft: #BFD6F2;
      --primary-bg: #F2F8FE;
      --primary-hover: #E6F2FC;
      --border-soft: #D5E3F2;
      --focus-ring: rgba(61, 165, 229, 0.2);
      --text-on-primary: #FFFFFF;
      --text-primary: #1F4F73;
    }

    body {
      font-family: 'Segoe UI', 'Meiryo', sans-serif;
      font-size: 14px;
      background: #eef5fb;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--primary);
      color: var(--text-on-primary);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 600; flex: 1; }
    header button {
      background: var(--text-on-primary);
      color: var(--text-primary);
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    header button:hover { background: var(--primary-hover); }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ---- Drop Overlay ---- */
    #dropOverlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(61, 165, 229, 0.14);
      border: 3px dashed var(--primary);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    #dropOverlay.active { display: flex; }
    #dropOverlay .drop-icon { font-size: 52px; }
    #dropOverlay .drop-text { font-size: 18px; font-weight: 700; color: var(--text-primary); }
    #dropOverlay .drop-sub  { font-size: 13px; color: var(--primary-dark); }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 100%;
      min-width: 0;
      background: #fff;
      border-right: none;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .main.editor-open .sidebar {
      width: 420px;
      min-width: 300px;
      max-width: 45%;
      border-right: 1px solid var(--border-soft);
    }

    .sidebar-controls {
      padding: 10px;
      border-bottom: 1px solid #eee;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sidebar-controls select,
    .sidebar-controls input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .sidebar-controls input:focus,
    .sidebar-controls select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .search-row {
      display: flex;
      gap: 6px;
    }
    .search-row input {
      flex: 1;
      min-width: 0;
    }
    .sidebar-btn {
      padding: 6px 8px;
      border: 1px solid var(--primary-soft);
      border-radius: 4px;
      background: var(--primary-bg);
      color: var(--primary-dark);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .sidebar-btn:hover:not(:disabled) {
      background: var(--primary-hover);
    }
    .sidebar-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .file-list {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      outline: none;
    }
    .route-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }
    .route-table thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f7f8fc;
      color: #4f5a80;
      font-weight: 700;
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border-soft);
    }
    .route-table thead th:nth-child(1) { width: 28%; }
    .route-table thead th:nth-child(2) { width: 36%; }
    .route-table thead th:nth-child(3) { width: 36%; }
    .route-table.expanded thead th:nth-child(1) { width: 14%; }
    .route-table.expanded thead th:nth-child(2) { width: 20%; }
    .route-table.expanded thead th:nth-child(3) { width: 20%; }
    .route-table.expanded thead th:nth-child(4) { width: 10%; }
    .route-table.expanded thead th:nth-child(5) { width: 18%; }
    .route-table.expanded thead th:nth-child(6) { width: 18%; }
    .file-item {
      padding: 0;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
      font-size: 12px;
      overflow: hidden;
      outline: none;
    }
    .file-item td {
      padding: 7px 10px;
      border-bottom: 1px solid #eef1fb;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }
    .file-item:hover { background: var(--primary-hover); }
    .file-item.focused { background: #d9ecfb; }
    .file-item.active {
      background: var(--primary-soft);
      border-left-color: var(--primary);
      font-weight: 600;
    }
    .file-item.note-season:not(.active) {
      background: #e8f4ff;
    }
    .file-item.note-suspend:not(.active) {
      background: #ffebee;
    }
    .file-item .file-id {
      color: #1a1a2e;
      font-weight: 600;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item .file-business {
      color: #555;
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item .file-route {
      color: #374151;
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item .file-business.empty { color: #9aa0b6; }
    .file-item .file-route.empty { color: #9aa0b6; }
    .sidebar-footer {
      padding: 8px 10px;
      font-size: 12px;
      color: #888;
      border-top: 1px solid #eee;
    }

    /* ---- Editor Panel ---- */
    .editor-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: none;
      flex-direction: column;
      gap: 16px;
    }
    .main.editor-open .editor-panel { display: flex; }

    .placeholder {
      margin: auto;
      text-align: center;
      color: #aaa;
    }
    .placeholder .icon { font-size: 48px; margin-bottom: 8px; }
    .placeholder p { font-size: 14px; }
    .placeholder .hint {
      margin-top: 20px;
      padding: 16px 24px;
      border: 2px dashed var(--primary-soft);
      border-radius: 8px;
      color: var(--primary-dark);
      font-size: 13px;
      line-height: 1.7;
    }

    .editor-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .editor-header h2 {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      word-break: break-all;
    }

    .badge {
      display: inline-block;
      background: var(--primary);
      color: var(--text-on-primary);
      border-radius: 10px;
      padding: 2px 10px;
      font-size: 11px;
      white-space: nowrap;
    }

    .back-btn {
      border: 1px solid var(--primary-soft);
      border-radius: 4px;
      background: var(--primary-bg);
      color: var(--primary-dark);
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .back-btn:hover { background: var(--primary-hover); }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 16px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--primary-hover);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 2fr 3fr;
      gap: 12px 20px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }
    .field select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .field select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--focus-ring);
    }
    .field input[type="text"],
    .field input[type="number"],
    .field input[type="url"],
    .field textarea,
    .field select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .field select { background: #fff; cursor: pointer; }
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--focus-ring);
    }
    .field textarea { resize: none; min-height: 60px; overflow: hidden; }
    .field textarea[data-format="comma"] { min-height: 0; }

    .tags-field {
      width: 100%;
    }
    .tags-list {
      width: 100%;
      min-height: 36px;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px;
      background: #fff;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 6px;
    }
    .tags-empty {
      color: #9aa0b6;
      font-size: 12px;
      padding: 2px 4px;
    }
    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--primary-soft);
      color: var(--text-primary);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      max-width: 100%;
    }
    .tag-chip-text {
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tag-chip-remove {
      border: none;
      background: transparent;
      color: var(--primary-dark);
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 0;
    }
    .tags-editor {
      border: 1px solid #ccc;
      border-radius: 4px;
      outline: none;
      flex: 1;
      min-width: 0;
      font-size: 13px;
      padding: 7px 10px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .tags-editor:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--focus-ring);
    }
    .tags-input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .btn-tag-add {
      height: 32px;
      padding: 0 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      color: #333;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-tag-add:hover {
      background: var(--primary-hover);
      border-color: var(--primary);
      color: var(--text-primary);
    }
    .tags-subhint {
      margin-top: 4px;
      font-size: 11px;
      color: #777;
    }

    .checkbox-label.flag-disabled { opacity: 0.4; cursor: default; }
    .checkbox-group { display: flex; gap: 16px; flex-wrap: wrap; }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .checkbox-label input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .flag-sep {
      width: 1px;
      background: #dde;
      align-self: stretch;
      margin: 0 4px;
    }

    .raw-editor {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px;
      width: 100%;
      min-height: 180px;
      resize: vertical;
      color: #1a1a2e;
    }
    .raw-editor:focus { outline: none; border-color: var(--primary); }

    .url-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .url-row input { flex: 1; min-width: 0; }
    .btn-url-check {
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f5f5f5;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-url-check:hover { background: var(--primary-hover); border-color: var(--primary); }
    .url-open-link {
      font-size: 16px;
      text-decoration: none;
      flex-shrink: 0;
      line-height: 1;
      opacity: 0.6;
    }
    .url-open-link:hover { opacity: 1; }
    .url-status {
      font-size: 12px;
      margin-top: 4px;
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .url-status .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-ok    { background: #2e7d32; }
    .dot-error { background: #c62828; }
    .dot-checking { background: #f9a825; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .raw-error { color: #c62828; font-size: 12px; margin-top: 4px; }
    /* ---- Field hint tooltip ---- */
    .field-label-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 4px;
    }
    .field-label-wrap label { margin-bottom: 0; }
    .required-mark { color: #c62828; margin-left: 2px; font-size: 11px; }
    .hint-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--primary);
      color: var(--text-on-primary);
      font-size: 10px;
      font-weight: 700;
      cursor: default;
      position: relative;
      flex-shrink: 0;
      line-height: 1;
    }
    .hint-icon:hover .hint-tooltip { display: block; }
    .hint-tooltip {
      display: none;
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: #37474f;
      color: #fff;
      font-size: 12px;
      font-weight: 400;
      padding: 7px 11px;
      border-radius: 5px;
      white-space: nowrap;
      z-index: 200;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      line-height: 1.6;
    }
    .hint-tooltip::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-right-color: #37474f;
      border-left: 0;
    }

    .tab-bar { display: flex; gap: 4px; margin-bottom: -1px; }
    .tab-btn {
      padding: 6px 14px;
      border: 1px solid #dde;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      background: #f0f2f5;
      font-size: 13px;
      cursor: pointer;
      color: #555;
    }
    .tab-btn.active {
      background: #fff;
      color: var(--primary);
      font-weight: 600;
      border-color: #dde;
    }

    .action-bar { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary { background: var(--primary); color: var(--text-on-primary); }
    .btn-primary:not(:disabled):hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--primary-soft); color: var(--text-primary); }
    .btn-secondary:not(:disabled):hover { background: #a9c7eb; }
    .btn-neutral {
      background: #374151;
      color: #fff;
    }
    .btn-neutral:not(:disabled):hover {
      background: #1f2937;
    }
    .btn-danger { background: #ef5350; color: #fff; }
    .btn-danger:not(:disabled):hover { background: #d32f2f; }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #323232;
      color: #fff;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 9999;
    }
    .toast.show { opacity: 1; }
    .toast.success { background: #2e7d32; }
    .toast.error   { background: #c62828; }

    .unsaved-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: #ff9800;
      border-radius: 50%;
      margin-left: 4px;
      vertical-align: middle;
    }

    .map-card {
      padding: 14px 16px;
    }
    .map-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .map-head h3 {
      margin-bottom: 0;
      border-bottom: none;
      padding-bottom: 0;
    }
    .map-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .map-btn {
      padding: 6px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .map-btn:hover {
      background: #e2e8f0;
      border-color: #94a3b8;
    }
    .map-status {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 8px;
      min-height: 18px;
      line-height: 1.4;
    }
    .map-canvas {
      width: 100%;
      height: 320px;
      border: 1px solid #dbe5f1;
      border-radius: 6px;
      overflow: hidden;
      background: #d9ecfb;
    }
    .line-list {
      margin-top: 10px;
      border: 1px solid #dbe5f1;
      border-radius: 6px;
      background: #fff;
      max-height: 180px;
      overflow-y: auto;
    }
    .line-list-row {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      border: none;
      border-bottom: 1px solid #eef2f7;
      background: #fff;
      text-align: left;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
      color: #334155;
    }
    .line-list-row:last-child {
      border-bottom: none;
    }
    .line-list-row:hover {
      background: #f8fafc;
    }
    .line-list-empty {
      padding: 10px;
      font-size: 12px;
      color: #64748b;
    }
    .line-id-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      border-radius: 999px;
      background: #e2e8f0;
      color: #1e293b;
      font-weight: 700;
      padding: 2px 10px;
      font-size: 11px;
      flex-shrink: 0;
    }
    .line-freq-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0c4a6e;
      font-weight: 700;
      padding: 2px 10px;
      font-size: 11px;
      flex-shrink: 0;
    }
    .line-port-text {
      min-width: 0;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .name-match {
      margin-top: 10px;
      border: 1px solid #dbe5f1;
      border-radius: 6px;
      background: #fff;
      padding: 10px;
      font-size: 12px;
      color: #334155;
      display: grid;
      gap: 6px;
    }
    .name-match-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-weight: 700;
      color: #1e293b;
    }
    .match-badge {
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .match-ok {
      background: #dcfce7;
      color: #166534;
    }
    .match-ng {
      background: #fee2e2;
      color: #991b1b;
    }
    .match-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px;
    }
    .match-row-key {
      color: #475569;
    }
    .match-row-val {
      color: #0f172a;
      word-break: break-word;
    }

    @media (max-width: 900px) {
      .map-canvas {
        height: 260px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Sea Route JSON Editor</h1>
  <button id="openBtn" type="button">📂 フォルダを開く</button>
</header>

<div class="main" id="mainArea">
  <!-- ドロップ時オーバーレイ -->
  <div id="dropOverlay">
    <div class="drop-icon">📂</div>
    <div class="drop-text">details フォルダをドロップ</div>
    <div class="drop-sub">読み書き権限が必要です</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-controls">
      <select id="layerSelect" disabled>
        <option value="">— レイヤー選択 —</option>
        <option value="seaRoute">seaRoute</option>
        <option value="seaRoute_international">seaRoute_international</option>
        <option value="seaRoute_KR">seaRoute_KR</option>
        <option value="seaRoute_limited">seaRoute_limited</option>
      </select>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="ルートID・名前を検索…" disabled>
        <button class="sidebar-btn" id="createBtn" type="button" disabled>＋ 新規作成</button>
      </div>
    </div>
    <div class="file-list" id="fileList" tabindex="0">
      <div style="padding:20px;text-align:center;color:#aaa;font-size:12px;">
        フォルダを開くと<br>ファイル一覧が表示されます
      </div>
    </div>
    <div class="sidebar-footer" id="sidebarFooter"></div>
  </div>

  <div class="editor-panel" id="editorPanel">
    <div class="placeholder">
      <div class="icon">📋</div>
      <p>左のリストからJSONファイルを選択してください</p>
      <div class="hint">
        📂 ボタンをクリックするか、<br>
        <strong>details フォルダをここにドラッグ＆ドロップ</strong>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
  // ---- State ----
  let rootDirHandle = null;
  let allFiles = {};
  let currentLayer = '';
  let currentFileHandle = null;
  let currentFileName = '';
  let currentData = null;
  let isModified = false;
  let isEditorOpen = false;
  let activeTab = 'form';
  let sidebarMetaByLayer = {};
  let sidebarMetaLoadPromise = {};
  const HANDLE_DB_NAME = 'searoute-editor-db';
  const HANDLE_STORE_NAME = 'handles';
  const HANDLE_KEY_ROOT = 'rootDir';
  const HANDLE_KEY_GEOJSON_DIR = 'geojsonDir';
  const UI_STATE_KEY = 'searoute-editor-ui-state';
  const GEOJSON_FILE_BY_LAYER = {
    seaRoute: 'seaRoute.geojson',
    seaRoute_international: 'seaRoute_international.geojson',
    seaRoute_KR: 'seaRoute_KR.geojson',
    seaRoute_limited: 'seaRoute_limited.geojson'
  };
  const MAP_SOURCE_ALL = 'routes-all';
  const MAP_SOURCE_MATCHED = 'routes-matched';
  const MAP_LAYER_ALL = 'routes-all-line';
  const MAP_LAYER_MATCHED = 'routes-matched-line';
  const MAP_LAYER_LINE_LABELS = 'routes-line-labels-symbol';
  const BASEMAP_STYLE_URL = 'https://tile.openstreetmap.jp/styles/maptiler-basic-ja/style.json';

  const LAYERS = ['seaRoute', 'seaRoute_international', 'seaRoute_KR', 'seaRoute_limited'];

  const FIELDS = [
    { key: 'businessName', label: '事業者名',           type: 'text',   full: false, required: true },
    { key: 'routeName',    label: '航路名',            type: 'text',   full: false, required: true },
    { key: 'url',          label: 'スケジュールURL',                type: 'url',    full: true  },
    { key: 'note',  label: '運行情報',  type: 'select', full: false,
      options: [{ value: '', label: '—' }, { value: 'season', label: 'season（季節・不定期）' }, { value: 'suspend', label: 'suspend（休止中）' }] },
    { key: 'freqInfo',     label: '運行頻度（テキスト）', type: 'text', full: false, hint: '複数項目は", "で区切られます' },
    { key: 'freq',  label: '運行頻度',  type: 'select', full: false, required: true,
      options: [{ value: '', label: '—' }, { value: 1, label: '1（1日1往復未満）' }, { value: 2, label: '2（1日1・2往復以上）' }, { value: 3, label: '3（1日3往復以上）' }] },
    { key: 'info',         label: '運行情報（テキスト）',               type: 'text',   full: false },
    { key: 'shipName',     label: '船名',               type: 'tags',   full: true },
  ];
  const FLAG_FIELDS = [
    { key: 'car',     label: '車両積載' },
    { key: 'bike',    label: 'バイク積載' },
    { key: 'bicycle', label: '自転車積載' },
  ];

  let routeMap = null;
  let mapReady = false;
  let geojsonDirHandle = null;
  let geojsonDataByLayer = {};
  let geojsonLoadPromiseByLayer = {};

  // ---- Natural sort comparator ----
  function naturalCompare(a, b) {
    return a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' });
  }

  // ---- Open folder (button) ----
  document.getElementById('openBtn').addEventListener('click', async () => {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      await initFromHandle(handle);
    } catch (e) {
      if (e.name !== 'AbortError') showToast('フォルダを開けませんでした: ' + e.message, 'error');
    }
  });

  // ---- Drag & Drop ----
  const mainArea = document.getElementById('mainArea');
  const dropOverlay = document.getElementById('dropOverlay');

  function setEditorOpen(open) {
    isEditorOpen = !!open;
    mainArea.classList.toggle('editor-open', isEditorOpen);
    if (currentLayer) renderFileList();
  }

  function closeEditorToList() {
    setEditorOpen(false);
    persistUiState();
  }

  setEditorOpen(false);

  // dragenter/dragleave でオーバーレイ表示切り替え
  let dragCounter = 0;
  mainArea.addEventListener('dragenter', e => {
    e.preventDefault();
    dragCounter++;
    dropOverlay.classList.add('active');
  });
  mainArea.addEventListener('dragleave', e => {
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); }
  });
  mainArea.addEventListener('dragover', e => { e.preventDefault(); });

  mainArea.addEventListener('drop', async e => {
    e.preventDefault();
    dragCounter = 0;
    dropOverlay.classList.remove('active');

    const items = e.dataTransfer.items;
    if (!items || items.length === 0) { showToast('アイテムがありません', 'error'); return; }

    // getAsFileSystemHandle() は Chrome 86+ で使用可能
    const item = items[0];
    if (typeof item.getAsFileSystemHandle !== 'function') {
      showToast('このブラウザはドロップによるフォルダ読み込みに対応していません。ボタンをお使いください。', 'error');
      return;
    }

    try {
      const handle = await item.getAsFileSystemHandle();
      if (handle.kind !== 'directory') {
        showToast('フォルダをドロップしてください', 'error');
        return;
      }
      await initFromHandle(handle);
    } catch (e) {
      showToast('ドロップ失敗: ' + e.message, 'error');
    }
  });

  // ---- Init from handle ----
  async function initFromHandle(handle, options = {}) {
    rootDirHandle = handle;
    await saveRootDirectoryHandle(handle);
    await loadAllFiles();
    document.getElementById('layerSelect').disabled = false;
    document.getElementById('searchInput').disabled = false;
    updateSidebarActionButtons();
    await restoreUiStateAfterLoad();
    if (!options.silent) showToast(`「${handle.name}」を読み込みました`, 'success');
  }

  async function loadAllFiles() {
    allFiles = {};
    sidebarMetaByLayer = {};
    sidebarMetaLoadPromise = {};
    for (const layer of LAYERS) {
      try {
        const layerHandle = await rootDirHandle.getDirectoryHandle(layer);
        const files = [];
        for await (const [name, handle] of layerHandle.entries()) {
          if (name.endsWith('.json') && handle.kind === 'file') {
            files.push({ name, handle });
          }
        }
        files.sort(naturalCompare);
        allFiles[layer] = files;
        sidebarMetaByLayer[layer] = {};
      } catch { allFiles[layer] = []; }
    }

    const first = LAYERS.find(l => allFiles[l] && allFiles[l].length > 0);
    if (first) {
      document.getElementById('layerSelect').value = first;
      currentLayer = first;
      renderFileList();
      ensureLayerSidebarMeta(first);
    }
  }

  document.getElementById('layerSelect').addEventListener('change', e => {
    currentLayer = e.target.value;
    document.getElementById('searchInput').value = '';
    renderFileList();
    ensureLayerSidebarMeta(currentLayer);
    ensureGeojsonLoadedForCurrentLayer().then(() => {
      if (isEditorOpen) updateRouteMapForCurrentFile();
    });
    updateSidebarActionButtons();
    persistUiState();
  });

  document.getElementById('searchInput').addEventListener('input', () => {
    renderFileList();
    persistUiState();
  });
  document.getElementById('createBtn').addEventListener('click', e => {
    e.preventDefault();
    createOrDuplicateFile(false);
  });

  function renderFileList() {
    const list = document.getElementById('fileList');
    const query = document.getElementById('searchInput').value.trim().toLowerCase();
    const layerMeta = sidebarMetaByLayer[currentLayer] || {};
    const files = (allFiles[currentLayer] || []).filter(f =>
      !query
      || f.name.toLowerCase().includes(query)
      || (layerMeta[f.name]?.businessName || '').toLowerCase().includes(query)
      || (layerMeta[f.name]?.routeName || '').toLowerCase().includes(query)
      || (layerMeta[f.name]?.note || '').toLowerCase().includes(query)
      || String(layerMeta[f.name]?.freq ?? '').toLowerCase().includes(query)
      || (layerMeta[f.name]?.shipName || '').toLowerCase().includes(query)
    );

    if (!files.length) {
      list.innerHTML = '<div style="padding:16px;text-align:center;color:#aaa;font-size:12px;">該当なし</div>';
      document.getElementById('sidebarFooter').textContent = '0 件';
      return;
    }

    const rowsHtml = files.map(f => {
      const id = f.name.replace('.json', '');
      const meta = layerMeta[f.name] || {};
      const businessName = meta.businessName || '';
      const routeName = meta.routeName || '';
      const note = meta.note || '';
      const freq = meta.freq ?? '';
      const freqInfo = meta.freqInfo || '';
      const info = meta.info || '';
      const titleText = [id, businessName, routeName].filter(Boolean).join(' / ');
      const noteClass = note === 'season' ? ' note-season' : note === 'suspend' ? ' note-suspend' : '';
      if (isEditorOpen) {
        return `<tr class="file-item${f.name === currentFileName ? ' active' : ''}${noteClass}"
          data-name="${f.name}" title="${escHtml(titleText)}" tabindex="-1">
          <td class="file-id">${escHtml(id)}</td>
          <td class="file-business${businessName ? '' : ' empty'}">${businessName ? escHtml(businessName) : '事業者名未設定'}</td>
          <td class="file-route${routeName ? '' : ' empty'}">${routeName ? escHtml(routeName) : '航路名未設定'}</td>
        </tr>`;
      }

      return `<tr class="file-item${f.name === currentFileName ? ' active' : ''}${noteClass}"
        data-name="${f.name}" title="${escHtml(titleText)}" tabindex="-1">
        <td class="file-id">${escHtml(id)}</td>
        <td class="file-business${businessName ? '' : ' empty'}">${businessName ? escHtml(businessName) : '-'}</td>
        <td class="file-route${routeName ? '' : ' empty'}">${routeName ? escHtml(routeName) : '-'}</td>
        <td>${freq === '' ? '<span class="file-route empty">-</span>' : escHtml(String(freq))}</td>
        <td class="file-route${freqInfo ? '' : ' empty'}">${freqInfo ? escHtml(freqInfo) : '-'}</td>
        <td class="file-route${info ? '' : ' empty'}">${info ? escHtml(info) : '-'}</td>
      </tr>`;
    }).join('');

    const tableClass = isEditorOpen ? 'route-table compact' : 'route-table expanded';
    const headHtml = isEditorOpen
      ? `
          <tr>
            <th>ID</th>
            <th>事業者名</th>
            <th>航路名</th>
          </tr>
        `
      : `
          <tr>
            <th>ID</th>
            <th>事業者名</th>
            <th>航路名</th>
            <th>運行頻度</th>
            <th>運行頻度テキスト</th>
            <th>備考</th>
          </tr>
        `;

    list.innerHTML = `
      <table class="${tableClass}" aria-label="航路一覧">
        <thead>
          ${headHtml}
        </thead>
        <tbody>
          ${rowsHtml}
        </tbody>
      </table>
    `;

    document.getElementById('sidebarFooter').textContent = `${files.length} 件`;

    list.querySelectorAll('.file-item').forEach(el => {
      el.addEventListener('click', () => {
        list.focus();
        setFocusedItem(el);
        openFile(el.dataset.name);
      });
    });

    // 矢印キーナビゲーション
    list.onkeydown = e => {
      const items = [...list.querySelectorAll('.file-item')];
      if (!items.length) return;
      const focused = list.querySelector('.file-item.focused');
      let idx = focused ? items.indexOf(focused) : items.findIndex(el => el.classList.contains('active'));
      if (idx < 0) idx = 0;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const next = items[Math.min(idx + 1, items.length - 1)];
        setFocusedItem(next);
        if (isEditorOpen && next?.dataset?.name) openFile(next.dataset.name);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = items[Math.max(idx - 1, 0)];
        setFocusedItem(prev);
        if (isEditorOpen && prev?.dataset?.name) openFile(prev.dataset.name);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const target = focused || items[idx];
        if (target?.dataset?.name) openFile(target.dataset.name);
      }
    };
  }

  async function ensureLayerSidebarMeta(layer) {
    if (!layer) return;
    const files = allFiles[layer] || [];
    if (!files.length) return;
    if (sidebarMetaLoadPromise[layer]) return sidebarMetaLoadPromise[layer];

    const meta = sidebarMetaByLayer[layer] || (sidebarMetaByLayer[layer] = {});
    const pending = files.filter(f => !meta[f.name]);
    if (!pending.length) return;

    const loadPromise = (async () => {
      for (const f of pending) {
        try {
          const file = await f.handle.getFile();
          const text = await file.text();
          const data = JSON.parse(text);
          meta[f.name] = extractListMeta(data);
        } catch {
          meta[f.name] = extractListMeta({});
        }
      }
    })().finally(() => {
      delete sidebarMetaLoadPromise[layer];
      if (layer === currentLayer) renderFileList();
    });

    sidebarMetaLoadPromise[layer] = loadPromise;
    return loadPromise;
  }

  function setFocusedItem(el) {
    const list = document.getElementById('fileList');
    list.querySelectorAll('.file-item.focused').forEach(e => e.classList.remove('focused'));
    if (!el) return;
    el.classList.add('focused');
    el.scrollIntoView({ block: 'nearest' });
  }

  function extractListMeta(data) {
    return {
      businessName: typeof data.businessName === 'string' ? data.businessName.trim() : '',
      routeName: typeof data.routeName === 'string' ? data.routeName.trim() : '',
      note: typeof data.note === 'string' ? data.note.trim() : '',
      freq: data.freq ?? '',
      freqInfo: typeof data.freqInfo === 'string' ? data.freqInfo.trim() : '',
      shipName: typeof data.shipName === 'string' ? data.shipName.trim() : '',
      info: typeof data.info === 'string' ? data.info.trim() : '',
    };
  }

  async function openFile(name, options = {}) {
    if (isModified && !options.skipUnsavedCheck) {
      if (!confirm('保存されていない変更があります。破棄しますか？')) return;
    }
    const fileEntry = allFiles[currentLayer].find(f => f.name === name);
    if (!fileEntry) return;

    try {
      const file = await fileEntry.handle.getFile();
      const text = await file.text();
      currentData = JSON.parse(text);
      if (!sidebarMetaByLayer[currentLayer]) sidebarMetaByLayer[currentLayer] = {};
      sidebarMetaByLayer[currentLayer][name] = extractListMeta(currentData);
      currentFileHandle = fileEntry.handle;
      currentFileName = name;
      isModified = false;
      renderEditor();
      setEditorOpen(true);
      await ensureGeojsonLoadedForCurrentLayer();
      updateRouteMapForCurrentFile();
      updateSidebarActionButtons();
      persistUiState();
    } catch (e) {
      showToast('ファイルを開けませんでした: ' + e.message, 'error');
    }
  }

  function updateSidebarActionButtons() {
    const createBtn = document.getElementById('createBtn');
    const duplicateBtn = document.getElementById('duplicateBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const selectedLayer = currentLayer || document.getElementById('layerSelect').value;
    const canCreate = !!(rootDirHandle && selectedLayer);
    createBtn.disabled = !canCreate;
    if (duplicateBtn) duplicateBtn.disabled = !(canCreate && currentFileHandle);
    if (deleteBtn) deleteBtn.disabled = !(canCreate && currentFileHandle);
  }

  async function createOrDuplicateFile(isDuplicate) {
    if (!rootDirHandle) {
      showToast('先に details フォルダを開いてください', 'error');
      return;
    }

    const targetLayer = currentLayer || document.getElementById('layerSelect').value;
    if (!targetLayer) {
      showToast('先にレイヤーを選択してください', 'error');
      return;
    }
    if (isDuplicate && !currentFileHandle) {
      showToast('複製するファイルを先に選択してください', 'error');
      return;
    }

    const defaultNameBase = isDuplicate
      ? currentFileName.replace(/\.json$/i, '') + '_copy'
      : '';
    const answer = prompt(
      isDuplicate
        ? '複製先のファイル名を入力してください（拡張子 .json は省略可）'
        : '新規ファイル名を入力してください（拡張子 .json は省略可）',
      defaultNameBase
    );
    if (answer === null) return;

    const normalized = normalizeJsonFileName(answer);
    if (!normalized) {
      showToast('ファイル名は英数字・_・- のみ使用できます', 'error');
      return;
    }
    const fileName = normalized + '.json';

    const layerFiles = allFiles[targetLayer] || (allFiles[targetLayer] = []);
    if (layerFiles.some(f => f.name === fileName)) {
      showToast(`${fileName} は既に存在します`, 'error');
      return;
    }

    const newData = isDuplicate
      ? JSON.parse(JSON.stringify(currentData))
      : { businessName: '', routeName: '', freq: 1 };

    try {
      const layerHandle = await rootDirHandle.getDirectoryHandle(targetLayer);
      const newFileHandle = await layerHandle.getFileHandle(fileName, { create: true });
      const writable = await newFileHandle.createWritable();
      await writable.write(JSON.stringify(newData, null, 2) + '\n');
      await writable.close();

      layerFiles.push({ name: fileName, handle: newFileHandle });
      layerFiles.sort(naturalCompare);
      if (!sidebarMetaByLayer[targetLayer]) sidebarMetaByLayer[targetLayer] = {};
      sidebarMetaByLayer[targetLayer][fileName] = extractListMeta(newData);

      currentLayer = targetLayer;
      document.getElementById('layerSelect').value = targetLayer;
      document.getElementById('searchInput').value = '';
      currentData = newData;
      currentFileHandle = newFileHandle;
      currentFileName = fileName;
      isModified = false;
      renderFileList();
      renderEditor();
      setEditorOpen(true);
      updateSidebarActionButtons();
      persistUiState();
      showToast(
        isDuplicate ? `${fileName} を複製作成しました` : `${fileName} を新規作成しました`,
        'success'
      );
    } catch (e) {
      showToast('ファイル作成失敗: ' + e.message, 'error');
    }
  }

  function normalizeJsonFileName(name) {
    const trimmed = String(name || '').trim().replace(/\.json$/i, '');
    if (!trimmed) return '';
    return /^[A-Za-z0-9_-]+$/.test(trimmed) ? trimmed : '';
  }

  async function deleteCurrentFile() {
    if (!rootDirHandle || !currentLayer || !currentFileHandle || !currentFileName) return;

    if (isModified) {
      const discard = confirm('保存されていない変更があります。削除を続行しますか？');
      if (!discard) return;
    }

    const confirmed = confirm(`${currentFileName} を削除します。元に戻せません。`);
    if (!confirmed) return;

    const layerFiles = allFiles[currentLayer] || [];
    const deletedIndex = layerFiles.findIndex(f => f.name === currentFileName);
    if (deletedIndex < 0) {
      showToast('削除対象ファイルが見つかりません', 'error');
      return;
    }

    try {
      const fileName = currentFileName;
      const layerHandle = await rootDirHandle.getDirectoryHandle(currentLayer);
      await layerHandle.removeEntry(fileName);

      layerFiles.splice(deletedIndex, 1);
      if (sidebarMetaByLayer[currentLayer]) delete sidebarMetaByLayer[currentLayer][fileName];

      const nextFile = layerFiles[deletedIndex] || layerFiles[deletedIndex - 1] || null;
      currentFileHandle = null;
      currentFileName = '';
      currentData = null;
      isModified = false;

      renderFileList();

      if (nextFile) {
        await openFile(nextFile.name, { skipUnsavedCheck: true });
      } else {
        renderEditorPlaceholder('このレイヤーにはJSONファイルがありません');
        setEditorOpen(false);
        updateSidebarActionButtons();
        persistUiState();
      }

      showToast(`${fileName} を削除しました`, 'success');
    } catch (e) {
      showToast('削除失敗: ' + e.message, 'error');
    }
  }

  function renderEditorPlaceholder(message) {
    const panel = document.getElementById('editorPanel');
    panel.innerHTML = `
      <div class="placeholder">
        <div class="icon">📋</div>
        <p>${escHtml(message || '左のリストからJSONファイルを選択してください')}</p>
        <div class="hint">
          📂 ボタンをクリックするか、<br>
          <strong>details フォルダをここにドラッグ＆ドロップ</strong>
        </div>
      </div>
    `;
  }

  async function restoreUiStateAfterLoad() {
    const state = readUiState();
    if (!state) return;

    const layerSelectEl = document.getElementById('layerSelect');
    const searchInputEl = document.getElementById('searchInput');

    if (state.layer && allFiles[state.layer]) {
      currentLayer = state.layer;
      layerSelectEl.value = state.layer;
    }
    if (!currentLayer) {
      currentLayer = layerSelectEl.value;
    }

    searchInputEl.value = typeof state.search === 'string' ? state.search : '';
    renderFileList();
    ensureLayerSidebarMeta(currentLayer);

    if (state.fileName && (allFiles[currentLayer] || []).some(f => f.name === state.fileName)) {
      if (state.editorOpen) {
        await openFile(state.fileName, { skipUnsavedCheck: true });
      } else {
        currentFileName = state.fileName;
        renderFileList();
        updateSidebarActionButtons();
      }
    }

    setEditorOpen(Boolean(state.editorOpen));
  }

  function persistUiState() {
    try {
      localStorage.setItem(UI_STATE_KEY, JSON.stringify({
        layer: currentLayer || document.getElementById('layerSelect').value || '',
        fileName: currentFileName || '',
        search: document.getElementById('searchInput').value || '',
        editorOpen: isEditorOpen
      }));
    } catch {
      // Ignore storage errors.
    }
  }

  function readUiState() {
    try {
      const raw = localStorage.getItem(UI_STATE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch {
      return null;
    }
  }

  async function openHandleDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(HANDLE_DB_NAME, 1);
      request.onupgradeneeded = () => {
        const db = request.result;
        if (!db.objectStoreNames.contains(HANDLE_STORE_NAME)) {
          db.createObjectStore(HANDLE_STORE_NAME);
        }
      };
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  async function saveRootDirectoryHandle(handle) {
    try {
      const db = await openHandleDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(HANDLE_STORE_NAME, 'readwrite');
        tx.objectStore(HANDLE_STORE_NAME).put(handle, HANDLE_KEY_ROOT);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
      db.close();
    } catch {
      // Ignore IndexedDB errors.
    }
  }

  async function getSavedRootDirectoryHandle() {
    try {
      const db = await openHandleDb();
      const result = await new Promise((resolve, reject) => {
        const tx = db.transaction(HANDLE_STORE_NAME, 'readonly');
        const req = tx.objectStore(HANDLE_STORE_NAME).get(HANDLE_KEY_ROOT);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
      db.close();
      return result;
    } catch {
      return null;
    }
  }

  async function saveGeojsonDirectoryHandle(handle) {
    try {
      const db = await openHandleDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(HANDLE_STORE_NAME, 'readwrite');
        tx.objectStore(HANDLE_STORE_NAME).put(handle, HANDLE_KEY_GEOJSON_DIR);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
      db.close();
    } catch {
      // Ignore IndexedDB errors.
    }
  }

  async function getSavedGeojsonDirectoryHandle() {

      const db = await openHandleDb();
      const result = await new Promise((resolve, reject) => {
        const tx = db.transaction(HANDLE_STORE_NAME, 'readonly');
        const req = tx.objectStore(HANDLE_STORE_NAME).get(HANDLE_KEY_GEOJSON_DIR);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
      db.close();
      return result;

  async function verifyDirectoryPermission(handle) {
    if (!handle) return false;
    const opts = { mode: 'readwrite' };
    if ((await handle.queryPermission(opts)) === 'granted') return true;
    if ((await handle.requestPermission(opts)) === 'granted') return true;
    return false;
  }

  async function verifyGeojsonDirectoryPermission(handle) {
    if (!handle) return false;
    const opts = { mode: 'read' };
    if ((await handle.queryPermission(opts)) === 'granted') return true;
    if ((await handle.requestPermission(opts)) === 'granted') return true;
    return false;
  }

  async function restoreHandleOnStartup() {
    const savedHandle = await getSavedRootDirectoryHandle();
    if (!savedHandle) return;
    try {
      const granted = await verifyDirectoryPermission(savedHandle);
      if (!granted) return;
      await initFromHandle(savedHandle, { silent: true });
      showToast('前回のフォルダを復元しました', 'success');
    } catch {
      // Ignore restore errors.
    }
  }

  async function restoreGeojsonDirectoryOnStartup() {
    const savedHandle = await getSavedGeojsonDirectoryHandle();
    if (!savedHandle) return;
    try {
      const granted = await verifyGeojsonDirectoryPermission(savedHandle);
      if (!granted) return;
      geojsonDirHandle = savedHandle;
      geojsonDataByLayer = {};
      geojsonLoadPromiseByLayer = {};
      if (currentLayer) {

  function getCurrentRouteId() {
    return (currentFileName || '').replace(/\.json$/i, '');

  async function ensureGeojsonLoadedForCurrentLayer() {
    if (!currentLayer) return false;
    if (geojsonDataByLayer[currentLayer]) return true;
    if (!geojsonDirHandle) {
      setMapStatus('GeoJSONフォルダ未設定です。「GeoJSONフォルダを開く」を押してください');
      return false;
    }
    if (geojsonLoadPromiseByLayer[currentLayer]) return geojsonLoadPromiseByLayer[currentLayer];

    const fileName = GEOJSON_FILE_BY_LAYER[currentLayer];
    if (!fileName) return false;

    const promise = (async () => {
      try {
        const fileHandle = await geojsonDirHandle.getFileHandle(fileName);
        const file = await fileHandle.getFile();
        const text = await file.text();
        const data = JSON.parse(text);
        if (!data || data.type !== 'FeatureCollection' || !Array.isArray(data.features)) {
          throw new Error('FeatureCollection ではありません');
        }
        geojsonDataByLayer[currentLayer] = data;
        setMapStatus(`${fileName} を自動読込しました（${data.features.length} feature）`);
        return true;
      } catch (e) {
        setMapStatus(`GeoJSON読込失敗: ${e.message}`);
        return false;
      }
    })();

    geojsonLoadPromiseByLayer[currentLayer] = promise.finally(() => {
      delete geojsonLoadPromiseByLayer[currentLayer];
    });
    return geojsonLoadPromiseByLayer[currentLayer];
  }

  async function pickGeojsonFolderAndReload() {
    if (!window.showDirectoryPicker) {
      showToast('このブラウザはフォルダ選択APIに対応していません', 'error');
      return;
    }
    try {
      const handle = await window.showDirectoryPicker({ mode: 'read' });
      geojsonDirHandle = handle;
      await saveGeojsonDirectoryHandle(handle);
      geojsonDataByLayer = {};
      geojsonLoadPromiseByLayer = {};
      await ensureGeojsonLoadedForCurrentLayer();
      updateRouteMapForCurrentFile({ forceFit: true });
      showToast(`GeoJSONフォルダ「${handle.name}」を設定しました`, 'success');
    } catch (e) {
      if (e.name !== 'AbortError') {
        showToast('GeoJSONフォルダ設定に失敗: ' + e.message, 'error');
      }
    }
  }

  function updateRouteMapForCurrentFile(options = {}) {
    if (!routeMap || !mapReady) return;
    ensureMapSourcesAndLayers();

    const layerData = geojsonDataByLayer[currentLayer];
    if (!layerData || !Array.isArray(layerData.features)) {
      setSourceData(MAP_SOURCE_ALL, emptyFeatureCollection());
      setSourceData(MAP_SOURCE_MATCHED, emptyFeatureCollection());
      renderLineList([], getCurrentRouteId());
      renderNameMatchCheck([], getCurrentRouteId(), 'GeoJSON未読込');
      const routeId = getCurrentRouteId();
      setMapStatus(`routeId ${routeId} を表示するには GeoJSONフォルダを設定してください`);
      return;
    }

    const routeId = getCurrentRouteId();
    const matchedFeatures = layerData.features.filter(f => {
      const props = f && f.properties ? f.properties : {};
      const candidate = props.routeId ?? props.route_id ?? props.id ?? props.ID ?? null;
      return candidate !== null && String(candidate) === routeId;
    });

    setSourceData(MAP_SOURCE_ALL, layerData);
    setSourceData(MAP_SOURCE_MATCHED, {
      type: 'FeatureCollection',
      features: matchedFeatures
    });
    renderLineList(matchedFeatures, routeId);
    renderNameMatchCheck(matchedFeatures, routeId);

    if (!matchedFeatures.length) {
      setMapStatus(`routeId ${routeId} の feature は見つかりませんでした`);
      return;
    }

    setMapStatus(`routeId ${routeId}: ${matchedFeatures.length} feature を表示中`);
    if (options.forceFit || !routeMap.__hasFittedOnce) {
      fitToFeatures(matchedFeatures);
      routeMap.__hasFittedOnce = true;
    }
  }

  function setSourceData(sourceName, data) {
    const source = routeMap.getSource(sourceName);
    if (!source || typeof source.setData !== 'function') return;
    source.setData(data);
  }

  function fitToFeatures(features) {
    const bounds = calculateBoundsFromFeatures(features);
    if (!bounds) return;
    routeMap.fitBounds(bounds, {
      padding: 30,
      duration: 500,
      maxZoom: 13
    });
  }

  function calculateBoundsFromFeatures(features) {
    let minLng = Infinity;
    let minLat = Infinity;
    let maxLng = -Infinity;
    let maxLat = -Infinity;
    let hasPoint = false;

    features.forEach(feature => {
      const coords = collectCoordinates(feature && feature.geometry);
      coords.forEach(pair => {
        const lng = Number(pair[0]);
        const lat = Number(pair[1]);
        if (!Number.isFinite(lng) || !Number.isFinite(lat)) return;
        hasPoint = true;
        if (lng < minLng) minLng = lng;
        if (lat < minLat) minLat = lat;
        if (lng > maxLng) maxLng = lng;
        if (lat > maxLat) maxLat = lat;
      });
    });

    if (!hasPoint) return null;
    return [[minLng, minLat], [maxLng, maxLat]];
  }

  function collectCoordinates(geometry) {
    if (!geometry || !geometry.type) return [];
    if (geometry.type === 'LineString' || geometry.type === 'MultiPoint') {
      return Array.isArray(geometry.coordinates) ? geometry.coordinates : [];
    }
    if (geometry.type === 'MultiLineString' || geometry.type === 'Polygon') {
      return (geometry.coordinates || []).flatMap(segment => Array.isArray(segment) ? segment : []);
    }
    if (geometry.type === 'MultiPolygon') {
      return (geometry.coordinates || []).flatMap(poly =>
        (poly || []).flatMap(segment => Array.isArray(segment) ? segment : [])
      );
    }
    if (geometry.type === 'Point') {
      return Array.isArray(geometry.coordinates) ? [geometry.coordinates] : [];
    }
    if (geometry.type === 'GeometryCollection') {
      return (geometry.geometries || []).flatMap(g => collectCoordinates(g));
    }
    return [];
  }

  function emptyFeatureCollection() {
    return { type: 'FeatureCollection', features: [] };
  }

  function setMapStatus(message) {
    const el = document.getElementById('mapStatus');
    if (el) el.textContent = message;
  }

  function renderNameMatchCheck(features, routeId, reason = '') {
    const el = document.getElementById('nameMatchContainer');
    if (!el) return;

    const jsonBusiness = String(currentData?.businessName || '').trim();
    const jsonRoute = String(currentData?.routeName || '').trim();
    const jsonCar = normalizeBinaryValue(currentData?.car);
    const jsonBike = normalizeBinaryValue(currentData?.bike);
    const jsonBicycle = normalizeBinaryValue(currentData?.bicycle);
    const geoBusinessValues = [...new Set(features.map(f => String(f?.properties?.businessName || '').trim()).filter(Boolean))];
    const geoRouteValues = [...new Set(features.map(f => String(f?.properties?.routeName || '').trim()).filter(Boolean))];
    const geoCarValues = [...new Set(features.map(f => normalizeBinaryValue(f?.properties?.car)).filter(v => v !== null))];
    const geoBikeValues = [...new Set(features.map(f => normalizeBinaryValue(f?.properties?.bike)).filter(v => v !== null))];
    const geoBicycleValues = [...new Set(features.map(f => normalizeBinaryValue(f?.properties?.bicycle)).filter(v => v !== null))];

    if (!features.length) {
      const reasonText = reason || `routeId ${routeId} の feature がありません`;
      el.innerHTML = `
        <div class="name-match-header">
          <span>JSON/GeoJSON 一致チェック</span>
          <span class="match-badge match-ng">未確認</span>
        </div>
        <div class="match-row">
          <span class="match-row-key">状態</span>
          <span class="match-row-val">${escHtml(reasonText)}</span>
        </div>
      `;
      return;
    }

    const businessOk = !!jsonBusiness && geoBusinessValues.includes(jsonBusiness);
    const routeOk = !!jsonRoute && geoRouteValues.includes(jsonRoute);
    const carOk = jsonCar !== null && geoCarValues.includes(jsonCar);
    const bikeOk = jsonBike !== null && geoBikeValues.includes(jsonBike);
    const bicycleOk = jsonBicycle !== null && geoBicycleValues.includes(jsonBicycle);
    const allOk = businessOk && routeOk && carOk && bikeOk && bicycleOk;

    el.innerHTML = `
      <div class="name-match-header">
        <span>JSON/GeoJSON 一致チェック</span>
        <span class="match-badge ${allOk ? 'match-ok' : 'match-ng'}">${allOk ? '一致' : '不一致'}</span>
      </div>
      <div class="match-row">
        <span class="match-row-key">JSON businessName</span>
        <span class="match-row-val">${escHtml(jsonBusiness || '(空)')}</span>
      </div>
      <div class="match-row">
        <span class="match-row-key">GeoJSON businessName</span>
        <span class="match-row-val">${escHtml(geoBusinessValues.join(' / ') || '(空)')}</span>
      </div>
      <div class="match-row">
        <span class="match-row-key">JSON routeName</span>
        <span class="match-row-val">${escHtml(jsonRoute || '(空)')}</span>
      </div>
      <div class="match-row">
        <span class="match-row-key">GeoJSON routeName</span>
        <span class="match-row-val">${escHtml(geoRouteValues.join(' / ') || '(空)')}</span>
      </div>
      <div class="match-row">
        <span class="match-row-key">JSON car/bike/bicycle</span>
        <span class="match-row-val">${escHtml(formatTriplet(jsonCar, jsonBike, jsonBicycle))}</span>
      </div>
      <div class="match-row">
        <span class="match-row-key">GeoJSON car/bike/bicycle</span>
        <span class="match-row-val">${escHtml(formatTripletSet(geoCarValues, geoBikeValues, geoBicycleValues))}</span>
      </div>
    `;
  }

  function normalizeBinaryValue(value) {
    if (value === undefined || value === null || value === '') return null;
    const n = Number(value);
    if (!Number.isFinite(n)) return null;
    return n > 0 ? 1 : 0;
  }

  function formatBinaryValue(value) {
    if (value === null) return '未設定';
    return value === 1 ? '1' : '0';
  }

  function formatTriplet(car, bike, bicycle) {
    return `car:${formatBinaryValue(car)} / bike:${formatBinaryValue(bike)} / bicycle:${formatBinaryValue(bicycle)}`;
  }

  function formatTripletSet(carValues, bikeValues, bicycleValues) {
    const setToText = values => values.length ? values.map(v => formatBinaryValue(v)).join('|') : '未設定';
    return `car:${setToText(carValues)} / bike:${setToText(bikeValues)} / bicycle:${setToText(bicycleValues)}`;
  }

  function renderLineList(features, routeId) {
    const el = document.getElementById('lineListContainer');
    if (!el) return;

    if (!features.length) {
      el.innerHTML = `<div class="line-list-empty">routeId ${escHtml(routeId)} の line はありません</div>`;
      return;
    }

    const rows = features.map((feature, idx) => {
      const props = feature && feature.properties ? feature.properties : {};
      const lineIdRaw = props.lineId ?? idx + 1;
      const lineId = String(lineIdRaw);
      const freq = props.freq === undefined || props.freq === null || props.freq === '' ? '未設定' : String(props.freq);
      const portName1 = String(props.portName1 || '').trim();
      const portName2 = String(props.portName2 || '').trim();
      const portText = portName1 || portName2
        ? `${portName1 || '—'} -> ${portName2 || '—'}`
        : '港情報なし';
      return `
        <button class="line-list-row" type="button" data-line-index="${idx}">
          <span class="line-id-chip">line ${escHtml(lineId)}</span>
          <span class="line-freq-chip">freq ${escHtml(freq)}</span>
          <span class="line-port-text">${escHtml(portText)}</span>
        </button>
      `;
    }).join('');

    el.innerHTML = rows;
    el.querySelectorAll('.line-list-row').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = Number(btn.dataset.lineIndex);
        if (!Number.isInteger(idx) || idx < 0 || idx >= features.length) return;
        fitToFeatures([features[idx]]);
      });
    });
  }

  function renderFormContent() {
    const d = currentData;
    const fieldsHtml = FIELDS.map(f => {
      const val = d[f.key] !== undefined ? String(d[f.key]) : '';
      const cls = f.full ? 'field full' : 'field';
      const reqMark = f.required ? '<span class="required-mark">*</span>' : '';
      const labelHtml = f.hint
        ? `<div class="field-label-wrap">
            <label>${f.label}${reqMark}</label>
            <span class="hint-icon">i<span class="hint-tooltip">${escHtml(f.hint).replace(/\n/g, '<br>')}</span></span>
          </div>`
        : `<label>${f.label}${reqMark}</label>`;
      if (f.type === 'select') {
        const optionsHtml = f.options.map(o =>
          `<option value="${escHtml(String(o.value))}"${String(d[f.key] ?? '') === String(o.value) ? ' selected' : ''}>${escHtml(o.label)}</option>`
        ).join('');
        return `<div class="${cls}">
          ${labelHtml}
          <select data-key="${f.key}" data-valuetype="${typeof f.options[1]?.value}">${optionsHtml}</select>
        </div>`;

      if (f.type === 'url') {
        const statusId = 'urlStatus_' + f.key;
        return `<div class="${cls}">
          ${labelHtml}
          <div class="url-row">
            <input type="url" data-key="${f.key}" value="${escHtml(val)}">
            <a class="url-open-link" href="${escHtml(val) || '#'}" target="_blank" rel="noopener" title="新しいタブで開く">🔗</a>
            <button class="btn-url-check" data-urlkey="${f.key}" data-statusid="${statusId}" type="button">確認</button>
          </div>
          <div class="url-status" id="${statusId}"></div>
        </div>`;
      }
      if (f.type === 'number') {
        return `<div class="${cls}">
          ${labelHtml}
          <input type="number" data-key="${f.key}" value="${escHtml(val)}" min="0">
        </div>`;
      }
      if (f.type === 'textarea') {
        return `<div class="${cls}">
          ${labelHtml}
          <textarea data-key="${f.key}">${escHtml(val)}</textarea>
        </div>`;
      }
      if (f.type === 'tags') {
        const tags = parseCommaTags(val);
        const tagsHtml = tags.map((tag, idx) => `
          <span class="tag-chip">
            <span class="tag-chip-text" title="${escHtml(tag)}">${escHtml(tag)}</span>
            <button class="tag-chip-remove" type="button" data-remove-tag="${idx}" aria-label="${escHtml(tag)} を削除">×</button>
          </span>
        `).join('');
        return `<div class="${cls}">
          ${labelHtml}
          <div class="tags-field" data-key="${f.key}">
            <div class="tags-list">
              ${tagsHtml || '<span class="tags-empty">追加された船名はありません</span>'}
            </div>
            <div class="tags-input-row">
              <input class="tags-editor" type="text" data-tag-editor="${f.key}" placeholder="船名を入力">
              <button class="btn-tag-add" type="button" data-tag-add="${f.key}">追加</button>
            </div>
          </div>
        </div>`;
      }
      return `<div class="${cls}">
        ${labelHtml}
        <input type="text" data-key="${f.key}" value="${escHtml(val)}">
      </div>`;
    }).join('');

    const knownFlagKeys = FLAG_FIELDS.map(f => f.key);
    const isUnknown = knownFlagKeys.every(k => !(k in d));
    const flagsHtml = `
      <label class="checkbox-label">
        <input type="checkbox" id="flagUnknown" ${isUnknown ? 'checked' : ''}> 不明
      </label>
      <div class="flag-sep"></div>
      ${FLAG_FIELDS.map(f => {
        const checked = d[f.key] ? 'checked' : '';
        const disabled = isUnknown ? 'disabled' : '';
        return `<label class="checkbox-label${isUnknown ? ' flag-disabled' : ''}">
          <input type="checkbox" data-key="${f.key}" ${checked} ${disabled}> ${f.label}
        </label>`;
      }).join('')}`;

    const knownKeys = new Set([...FIELDS.map(f => f.key), ...FLAG_FIELDS.map(f => f.key)]);
    const extraKeys = Object.keys(d).filter(k => !knownKeys.has(k));
    const extraHtml = extraKeys.length ? `
      <div class="field full" style="margin-top:8px">
        <label>その他のフィールド (JSON)</label>
        <textarea id="extraFields" rows="3">${escHtml(JSON.stringify(Object.fromEntries(extraKeys.map(k => [k, d[k]])), null, 2))}</textarea>
        <div class="raw-error" id="extraError"></div>
      </div>` : '';

    return `
      <h3>基本情報</h3>
      <div class="form-grid">
        ${fieldsHtml}
        <div class="field full">
          <label>積載可否</label>
          <div class="checkbox-group">${flagsHtml}</div>
        </div>
        ${extraHtml}
      </div>
    `;
  }

  function renderRawContent() {
    return `
      <h3>JSON（生編集）</h3>
      <textarea class="raw-editor" id="rawEditor" spellcheck="false">${escHtml(JSON.stringify(currentData, null, 2))}</textarea>
      <div class="raw-error" id="rawError"></div>
    `;
  }

  function bindFormEvents() {
    document.querySelectorAll('#tabContent input[data-key][type="text"], #tabContent input[data-key][type="number"], #tabContent input[data-key][type="url"]')
      .forEach(el => el.addEventListener('input', () => {
        const key = el.dataset.key;
        if (el.type === 'number') {
          const v = el.value.trim();
          if (v === '') delete currentData[key]; else currentData[key] = Number(v);
        } else {
          const v = el.value.trim();
          if (v === '') delete currentData[key]; else currentData[key] = v;
        }
        // URL フィールドの場合はリンクアイコンも更新
        if (el.type === 'url') {
          const link = el.closest('.field')?.querySelector('.url-open-link');
          if (link) link.href = el.value || '#';
          const statusEl = el.closest('.field')?.querySelector('.url-status');
          if (statusEl) statusEl.innerHTML = '';
        }
        markModified();
        if ((key === 'businessName' || key === 'routeName') && routeMap && mapReady) {
          updateRouteMapForCurrentFile();
        }
      }));

    // Textarea fields
    document.querySelectorAll('#tabContent textarea[data-key]')
      .forEach(el => el.addEventListener('input', () => {
        const key = el.dataset.key;
        const v = el.value.trim();
        if (v === '') {
          delete currentData[key];
        } else {
          currentData[key] = v;
        }
        // 高さを自動調整
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
        markModified();
      }));

    // Tag fields (comma separated string)
    document.querySelectorAll('#tabContent .tags-field[data-key]').forEach(field => {
      const key = field.dataset.key;
      const editor = field.querySelector('.tags-editor');
      const addBtn = document.querySelector(`#tabContent button[data-tag-add="${key}"]`);
      let isComposing = false;

      const getTags = () => parseCommaTags(currentData[key] ?? '');

      const setTags = tags => {
        const uniqueTags = [];
        tags.forEach(tag => {
          if (!uniqueTags.includes(tag)) uniqueTags.push(tag);
        });
        if (!uniqueTags.length) {
          delete currentData[key];
        } else {
          currentData[key] = uniqueTags.join(', ');
        }
        markModified();
      };

      const commitEditorValue = () => {
        const raw = editor.value;
        if (!raw || !raw.trim()) return;
        const newTags = parseCommaTags(raw);
        if (!newTags.length) {
          editor.value = '';
          return;
        }
        // Clear first to avoid duplicate commit when blur fires during rerender.
        editor.value = '';
        const tags = getTags();
        setTags(tags.concat(newTags));
        renderEditor();
      };

      editor.addEventListener('keydown', e => {
        if (e.isComposing || isComposing) return;
        if (e.key === ',' || e.key === '、' || e.key === 'Enter') {
          e.preventDefault();
          commitEditorValue();
          return;
        }
        if (e.key === 'Backspace' && !editor.value) {
          const tags = getTags();
          if (!tags.length) return;
          tags.pop();
          setTags(tags);
          renderEditor();
        }
      });

      editor.addEventListener('input', () => {
        if (isComposing) return;
        if (editor.value.includes(',') || editor.value.includes('、')) {
          commitEditorValue();
        }
      });

      editor.addEventListener('compositionstart', () => { isComposing = true; });
      editor.addEventListener('compositionend', () => { isComposing = false; });

      editor.addEventListener('blur', commitEditorValue);

      if (addBtn) {
        addBtn.addEventListener('click', commitEditorValue);
      }

      field.querySelectorAll('button[data-remove-tag]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = Number(btn.dataset.removeTag);
          const tags = getTags();
          if (Number.isNaN(idx) || idx < 0 || idx >= tags.length) return;
          tags.splice(idx, 1);
          setTags(tags);
          renderEditor();
        });
      });
    });

    // URL 確認ボタン
    document.querySelectorAll('#tabContent .btn-url-check').forEach(btn => {
      btn.addEventListener('click', async () => {
        const key = btn.dataset.urlkey;
        const statusEl = document.getElementById(btn.dataset.statusid);
        const url = currentData[key];
        if (!url) { statusEl.innerHTML = '<span style="color:#888">URLが未入力です</span>'; return; }
        statusEl.innerHTML = '<span class="dot dot-checking"></span> 確認中…';
        await checkUrl(url, statusEl);
      });
    });

    document.querySelectorAll('#tabContent select[data-key]')
      .forEach(el => el.addEventListener('change', () => {
        const v = el.value;
        if (v === '') { delete currentData[el.dataset.key]; }
        else { currentData[el.dataset.key] = el.dataset.valuetype === 'number' ? Number(v) : v; }
        markModified();
      }));

    const flagUnknown = document.getElementById('flagUnknown');
    if (flagUnknown) {
      flagUnknown.addEventListener('change', () => {
        const flagEls = document.querySelectorAll('#tabContent input[type="checkbox"][data-key]');
        if (flagUnknown.checked) {
          FLAG_FIELDS.forEach(f => delete currentData[f.key]);
          flagEls.forEach(el => {
            el.checked = false;
            el.disabled = true;
            el.closest('.checkbox-label').classList.add('flag-disabled');
          });
        } else {
          FLAG_FIELDS.forEach(f => { currentData[f.key] = 0; });
          flagEls.forEach(el => {
            el.disabled = false;
            el.closest('.checkbox-label').classList.remove('flag-disabled');
          });
        }
        markModified();
        if (routeMap && mapReady) {
          updateRouteMapForCurrentFile();
        }
      });
    }

    document.querySelectorAll('#tabContent input[type="checkbox"][data-key]')
      .forEach(el => el.addEventListener('change', () => {
        currentData[el.dataset.key] = el.checked ? 1 : 0;
        markModified();
        if (routeMap && mapReady) {
          updateRouteMapForCurrentFile();
        }
      }));

    const extraArea = document.getElementById('extraFields');
    if (extraArea) {
      extraArea.addEventListener('input', () => {
        const errEl = document.getElementById('extraError');
        try {
          const parsed = JSON.parse(extraArea.value || '{}');
          const knownKeys = new Set([...FIELDS.map(f => f.key), ...FLAG_FIELDS.map(f => f.key)]);
          Object.keys(currentData).filter(k => !knownKeys.has(k)).forEach(k => delete currentData[k]);
          Object.assign(currentData, parsed);
          errEl.textContent = '';
          markModified();
        } catch (e) {
          errEl.textContent = 'JSON構文エラー: ' + e.message;
        }
      });
    }

    // 全textareaの高さを初期化
    document.querySelectorAll('#tabContent textarea').forEach(el => {
      el.style.height = 'auto';
      el.style.height = el.scrollHeight + 'px';
    });
  }

  function bindRawEvents() {
    const rawEl = document.getElementById('rawEditor');
    const errEl = document.getElementById('rawError');
    rawEl.addEventListener('input', () => {
      try {
        currentData = JSON.parse(rawEl.value);
        errEl.textContent = '';
        markModified();
        if (routeMap && mapReady) {
          updateRouteMapForCurrentFile();
        }
      } catch (e) {
        errEl.textContent = 'JSON構文エラー: ' + e.message;
      }
    });
  }

  function markModified() {
    isModified = true;
    const mark = document.getElementById('unsavedMark');
    if (mark) mark.style.display = '';
  }

  async function saveFile() {
    if (!currentFileHandle) return;
    const missing = FIELDS.filter(f => f.required && (currentData[f.key] === undefined || currentData[f.key] === '' || currentData[f.key] === null));
    if (missing.length) {
      showToast('必須項目が未入力です: ' + missing.map(f => f.label).join('、'), 'error');
      return;
    }
    try {
      const writable = await currentFileHandle.createWritable();
      await writable.write(JSON.stringify(currentData, null, 2) + '\n');
      await writable.close();
      if (!sidebarMetaByLayer[currentLayer]) sidebarMetaByLayer[currentLayer] = {};
      sidebarMetaByLayer[currentLayer][currentFileName] = extractListMeta(currentData);
      isModified = false;
      const mark = document.getElementById('unsavedMark');
      if (mark) mark.style.display = 'none';
      renderFileList();
      showToast(`${currentFileName} を保存しました`, 'success');
    } catch (e) {
      showToast('保存失敗: ' + e.message, 'error');
    }
  }

  // ---- URL チェック ----
  async function checkUrl(url, statusEl) {
    const signal = AbortSignal.timeout(10000);
    // まず通常 fetch（CORS 対応サイトならタイトルも取得できる）
    try {
      const res = await fetch(url, { signal });
      if (!res.ok) {
        statusEl.innerHTML = `<span class="dot dot-error"></span> <span style="color:#c62828">✗ HTTP ${res.status}</span>`;
        return;
      }
      const ct = res.headers.get('content-type') || '';
      if (ct.includes('text/html')) {
        const html = await res.text();
        const m = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
        const title = m ? m[1].trim().replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/\s+/g,' ') : '';
        statusEl.innerHTML = `<span class="dot dot-ok"></span> <span style="color:#2e7d32">✓ 生存</span>`
          + (title ? ` <span style="color:#555;font-size:11px">— ${escHtml(title)}</span>` : '');
      } else {
        statusEl.innerHTML = `<span class="dot dot-ok"></span> <span style="color:#2e7d32">✓ 生存</span> <span style="color:#888;font-size:11px">(${escHtml(ct.split(';')[0])})</span>`;
      }
      return;
    } catch (e) {
      if (e.name === 'TimeoutError') {
        statusEl.innerHTML = `<span class="dot dot-error"></span> <span style="color:#c62828">✗ タイムアウト</span>`;
        return;
      }
      // CORS エラーなど → no-cors で死活だけ確認
    }
    try {
      await fetch(url, { mode: 'no-cors', signal: AbortSignal.timeout(8000) });
      // no-cors は opaque response → エラーなければ生存
      statusEl.innerHTML = `<span class="dot dot-ok"></span> <span style="color:#2e7d32">✓ 生存</span> <span style="color:#888;font-size:11px">(タイトル取得不可)</span>`;
    } catch (e2) {
      statusEl.innerHTML = `<span class="dot dot-error"></span> <span style="color:#c62828">✗ 到達不能: ${escHtml(e2.message)}</span>`;
    }
  }

  // ---- Utils ----
  function parseCommaTags(value) {
    return String(value)
      .split(/[、,]/)
      .map(v => v.trim())
      .filter(Boolean);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  let toastTimer = null;
  function showToast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
  }

  // Ctrl+S で保存
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      if (currentFileHandle) saveFile();
      return;
    }

    if (e.key === 'Escape' && isEditorOpen) {
      e.preventDefault();
      closeEditorToList();
    }
  });

  restoreHandleOnStartup().finally(() => {
    restoreGeojsonDirectoryOnStartup();
  });
</script>
</body>
