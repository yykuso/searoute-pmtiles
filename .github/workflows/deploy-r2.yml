name: Deploy to Cloudflare R2

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials for R2
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws-region: auto

      - name: Upload data files to R2
        env:
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp searoute.pmtiles s3://$R2_BUCKET_NAME/searoute.pmtiles \
            --endpoint-url "$R2_ENDPOINT"
          aws s3 sync details s3://$R2_BUCKET_NAME/details \
            --endpoint-url "$R2_ENDPOINT" \
            --delete
          aws s3 sync geojson s3://$R2_BUCKET_NAME/geojson \
            --endpoint-url "$R2_ENDPOINT" \
            --delete