name: Deploy to Cloudflare R2

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect geojson changes
        id: changes
        run: |
          if [ -z "${{ github.event.before }}" ]; then
            echo "geojson=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q '^geojson/'; then
            echo "geojson=true" >> "$GITHUB_OUTPUT"
          else
            echo "geojson=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tippecanoe 2.79.0
        if: steps.changes.outputs.geojson == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libsqlite3-dev zlib1g-dev
          git clone https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          git -C /tmp/tippecanoe checkout 2.79.0
          make -C /tmp/tippecanoe -j"$(nproc)"
          sudo make -C /tmp/tippecanoe install
          tippecanoe --version

      - name: Build PMTiles (direct output)
        if: steps.changes.outputs.geojson == 'true'
        run: |
          tippecanoe -zg -o searoute.pmtiles --force \
            -L seaRoute:geojson/seaRoute.geojson \
            -L seaRoute_limited:geojson/seaRoute_limited.geojson \
            -L seaRoute_international:geojson/seaRoute_international.geojson \
            -L seaRoute_KR:geojson/seaRoute_KR.geojson

      - name: Verify PMTiles archive
        if: steps.changes.outputs.geojson == 'true'
        run: |
          docker run --rm \
            -v "$PWD:/data" \
            protomaps/go-pmtiles@sha256:dcec7fe1bdd371e28289f2e7cef419a0a402289e02640c094570d54beb29fa8a \
            verify /data/searoute.pmtiles

      - name: Generate lightweight JSON
        if: steps.changes.outputs.geojson == 'true'
        run: node scripts/generate-lightweight-json.mjs

      - name: Validate PMTiles header
        if: steps.changes.outputs.geojson == 'true'
        run: |
          magic=$(head -c 8 searoute.pmtiles | od -An -t x1 | tr -d ' \n')
          if [ "$magic" != "504d54696c657303" ]; then
            echo "Invalid searoute.pmtiles header: $magic"
            echo "Expected PMTiles v3 magic bytes: 504d54696c657303"
            exit 1
          fi

      - name: Upload data files to R2
        if: steps.changes.outputs.geojson == 'true'
        env:
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync . s3://$R2_BUCKET_NAME \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "*" \
            --include "searoute.pmtiles"
          aws s3 sync details s3://$R2_BUCKET_NAME/details \
            --endpoint-url "$R2_ENDPOINT" \
            --delete
          aws s3 sync geojson s3://$R2_BUCKET_NAME/geojson \
            --endpoint-url "$R2_ENDPOINT" \
            --delete
          aws s3 sync lightweight s3://$R2_BUCKET_NAME/lightweight \
            --endpoint-url "$R2_ENDPOINT" \
            --delete