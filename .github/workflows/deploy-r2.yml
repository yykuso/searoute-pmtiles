name: Deploy to Cloudflare R2

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate lightweight JSON
        run: node scripts/generate-lightweight-json.mjs

      - name: Upload data files to R2
        env:
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 sync . s3://$R2_BUCKET_NAME \
            --endpoint-url "$R2_ENDPOINT" \
            --exclude "*" \
            --include "searoute.pmtiles"
          aws s3 sync details s3://$R2_BUCKET_NAME/details \
            --endpoint-url "$R2_ENDPOINT" \
            --delete
          aws s3 sync geojson s3://$R2_BUCKET_NAME/geojson \
            --endpoint-url "$R2_ENDPOINT" \
            --delete
          aws s3 sync lightweight s3://$R2_BUCKET_NAME/lightweight \
            --endpoint-url "$R2_ENDPOINT" \
            --delete